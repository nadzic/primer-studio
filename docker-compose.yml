services:
  api:
    build:
      context: .
      dockerfile: Dockerfile.dev
    container_name: primer-studio-api
    ports:
      - "8000:8000"
    expose:
      - "8000"
    env_file:
      - .env
    environment:
      PYTHONPATH: /app
    volumes:
      - ./:/app
    command: uv run uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload

  frontend:
    build:
      context: ./app/frontend
      dockerfile: Dockerfile.dev
    container_name: primer-studio-frontend
    ports:
      - "3000:3000"
    environment:
      - NEXT_PUBLIC_API_URL=http://localhost:8000/api/v1
    depends_on:
      - api
    volumes:
      - ./app/frontend:/app
      - /app/node_modules
