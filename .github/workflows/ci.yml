name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:
    inputs:
      run_llm_evals:
        description: Run LLM-based evals
        required: false
        default: false
        type: boolean
  schedule:
    - cron: "0 3 * * *"

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  quality-check-frontend:
    name: Frontend Lint, Typecheck, Build, Format, Tests
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: app/frontend

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: app/frontend/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: npm run lint

      - name: Type check
        run: npm run typecheck

      - name: Build
        env:
          NEXT_PUBLIC_API_URL: http://localhost:8000/api/v1
          NEXT_PUBLIC_SITE_URL: http://localhost:3000
        run: npm run build

      - name: Format check
        run: npm run format:check

      - name: Tests
        run: npm run test

  quality-check-python:
    name: Lint, Type Check, and Tests
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup uv + Python
        uses: astral-sh/setup-uv@v5
        with:
          python-version: "3.11"
          enable-cache: true

      - name: Sync dependencies
        run: uv sync --extra dev

      - name: Ruff lint
        run: uv run ruff check .

      - name: BasedPyright type check
        run: uv run basedpyright --level error .

      - name: Pytest run tests
        run: |
          if [ -d tests ]; then
            uv run pytest -q
          else
            echo "No tests directory found. Skipping pytest."
          fi

      - name: Compile smoke check
        run: uv run python -m compileall app

  quality-check-evals:
    name: Evals Contract Tests
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup uv + Python
        uses: astral-sh/setup-uv@v5
        with:
          python-version: "3.11"
          enable-cache: true

      - name: Sync dependencies
        run: uv sync --extra dev

      - name: Run evals contract tests
        run: uv run pytest -q evals/rag/generation/test_generation_dataset_contract_v2.py

  llm-evals:
    name: LLM Evals (RAG Generation)
    runs-on: ubuntu-latest
    if: github.event_name == 'schedule' || (github.event_name == 'workflow_dispatch' && inputs.run_llm_evals == true)
    env:
      OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup uv + Python
        uses: astral-sh/setup-uv@v5
        with:
          python-version: "3.11"
          enable-cache: true

      - name: Sync dependencies
        run: uv sync --extra dev

      - name: Ensure OPENAI_API_KEY is available
        run: |
          if [ -z "${OPENAI_API_KEY}" ]; then
            echo "OPENAI_API_KEY is not set. Skipping LLM evals."
            exit 0
          fi

      - name: Run LLM eval tests
        run: |
          uv run pytest -q \
            evals/rag/generation/test_generation_faitfulness_deepeval.py \
            evals/rag/generation/test_generation_relevancy_deepeval.py \
            evals/rag/generation/test_generation_correctness_custom_deepeval.py

  docker:
    name: Docker build
    runs-on: ubuntu-latest
    needs: [quality-check-python, quality-check-frontend, quality-check-evals]

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Build docker image
        run: docker build -t primer-studio:ci .
